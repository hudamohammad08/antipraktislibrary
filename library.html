<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Dashboard & AI Tool</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background-color: #0b0e14; 
            color: #fff; 
            margin: 0; 
            padding: 10px; 
            transition: background-color 1s ease; 
        }
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { 
            flex: 1; 
            min-width: 22%; 
            padding: 10px 8px; 
            background: #1f2630; 
            border: none; 
            color: #888; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 11px; 
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }
        .tab-btn.active { background: #2962ff; color: #fff; }
        .content { display: none; } 
        .content.active { display: block; }
        
        .live-panel { 
            background: #17212b; 
            padding: 15px; 
            text-align: center; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            border: 1px solid #363c4e; 
        }
        .live-price { font-size: 26px; font-weight: bold; color: #e0e0e0; margin: 5px 0; letter-spacing: 0.5px; }
        .pnl-box { font-size: 20px; font-weight: bold; padding: 10px; border-radius: 5px; background: #0b0e14; margin-top: 5px; }
        .pnl-green { color: #089981; } 
        .pnl-red { color: #f23645; }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 6px 0; 
            background: #242f3d; 
            color: white; 
            border: 1px solid #363c4e; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        input:focus, select:focus { outline: 1px solid #2962ff; border-color: #2962ff; }
        
        button.action-btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            margin-top: 6px; 
            font-size: 14px;
            transition: filter 0.2s;
        }
        button.action-btn:active { filter: brightness(0.8); }
        .buy { background: #089981; } 
        .sell { background: #f23645; } 
        .blue { background: #1976d2; }
        
        .trade-row { display: flex; gap: 6px; margin-top: 5px; }
        .trade-row button, .trade-row input { flex: 1; margin: 0; }
        
        h4 { margin: 15px 0 10px 0; border-bottom: 1px solid #363c4e; padding-bottom: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        details { background: #1f2630; padding: 12px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #363c4e; }
        summary { font-weight: bold; font-size: 13px; outline: none; cursor: pointer; user-select: none; }
        .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
        .edu-btn { 
            padding: 12px 8px; 
            font-size: 11px; 
            border: none; 
            border-radius: 5px; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: center;
        }
        
        .bg-red { background: #d32f2f; } .bg-orange { background: #f57c00; } 
        .bg-yellow { background: #fbc02d; color: black; } .bg-green { background: #388e3c; } 
        .bg-blue { background: #1976d2; } .bg-purple { background: #6a1b9a; }
        .bg-teal { background: #00897b; } .bg-brown { background: #795548; }
        .bg-pink { background: #c2185b; } .bg-grey { background: #616161; }

        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.98); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box; text-align: center;
        }
        .quiz-btn { 
            width: 100%; padding: 15px; margin: 8px 0; background: #242f3d; 
            border: 1px solid #2962ff; border-radius: 8px; color: white; 
            font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; 
        }
        .quiz-btn:active { background: #2962ff; }
        
        .rain-icon { 
            position: fixed; z-index: 9998; font-size: 28px; font-weight: bold; 
            animation: fall linear forwards; pointer-events: none; 
            text-shadow: 0px 0px 10px rgba(0,0,0,0.5); 
        }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>
    <div id="quiz-overlay">
        <h2 style="color: #2962ff; margin-bottom: 5px; font-size: 24px;">🚀 Welcome Trader!</h2>
        <p style="color: #aaa; margin-top: 0; margin-bottom: 20px; font-size: 14px;">Jawab kuis pemanasan ini untuk membuka Dashboard</p>
        <div id="quiz-container" style="width: 100%; max-width: 400px; background: #17212b; padding: 20px; border-radius: 10px; border: 1px solid #363c4e; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <h3 id="quiz-question" style="margin-top: 0; color: #e0e0e0; font-size: 16px; line-height: 1.4;">Memuat kuis...</h3>
            <div id="quiz-options"></div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('main', this)">📈 Trade</button>
        <button class="tab-btn" onclick="showTab('news', this)">📅 Kalender</button>
        <button class="tab-btn" onclick="showTab('combo', this)">🔄 Combo</button>
    </div>

    <div id="main" class="content active">
        <div class="live-panel">
            <div style="font-size: 12px; color: #aaa; font-weight: 500;" id="status-text">Menunggu Market...</div>
            <div class="live-price" id="live-price">Memuat Data...</div>
            <div class="pnl-box" id="pnl-display">Floating: $0.00</div>
        </div>
        <div id="tv-chart" style="height:260px; margin-bottom:10px; border-radius: 6px; overflow: hidden; border: 1px solid #363c4e;"></div>
        <select id="pair" onchange="changePair()">
            <option value="PAXGUSDT">XAUUSD (Gold Proxy)</option>
            <option value="BTCUSDT">BTCUSDT (Bitcoin)</option>
            <option value="EURUSDT">EURUSD (Euro Proxy)</option>
        </select>
        <div class="trade-row">
            <input type="number" id="lot" placeholder="Lot (Cth: 0.1)" step="0.01" value="0.1">
        </div>
        <div class="trade-row">
            <button class="action-btn buy" onclick="execTrade('BUY')">BUY</button>
            <button class="action-btn sell" onclick="execTrade('SELL')">SELL</button>
        </div>
        <button class="action-btn" onclick="execClose()" style="background:#ffa000; color:black; margin-top: 8px;">🔴 TUTUP POSISI</button>
    </div>

    <div id="news" class="content">
        <div style="background: #17212b; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #363c4e;">
            <h4 style="color:#2962ff; margin-top: 0;">🤖 Filter Kalender AI</h4>
            <input type="text" id="newsName" placeholder="Kopas Penjelasan Berita di sini">
            <div class="trade-row">
                <input type="text" id="newsAct" placeholder="Aktual">
                <input type="text" id="newsPrev" placeholder="Prev">
                <input type="text" id="newsFore" placeholder="Fore">
            </div>
            <div class="trade-row">
                <button class="action-btn blue" onclick="processNews('TRANSLATE')">🔤 TERJEMAHKAN</button>
                <button class="action-btn buy" onclick="processNews('ANALYZE')">🤖 ANALISIS</button>
            </div>
        </div>
        <div style="height: 400px; background: #131722; border-radius: 8px; overflow: hidden; border: 1px solid #363c4e;">
            <div class="tradingview-widget-container">
              <div class="tradingview-widget-container__widget"></div>
              <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
              { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "400", "locale": "id", "importanceFilter": "-1,0,1", "currencyFilter": "USD,EUR,GBP,JPY,AUD,CAD,CHF,NZD" }
              </script>
            </div>
        </div>
    </div>

    <div id="combo" class="content">
        <div style="background: #17212b; padding: 15px; border-radius: 8px; border: 1px solid #363c4e;">
            <p style="font-size:12px; color:#aaa; margin-top:0;">Analisis Rilis Ganda beserta prioritas datanya (Institusional Logic).</p>
            <h4 style="color: #ef5350; margin-top: 5px;">🔥 Dampak Sangat Tinggi</h4>
            <div class="edu-grid">
                <button class="edu-btn bg-red" onclick="reqAction('COMBO_NEWS', 'Paket NFP (NFP, AHE, Unemployment)')">Paket NFP</button>
                <button class="edu-btn bg-red" onclick="reqAction('COMBO_NEWS', 'Paket CPI (Core CPI & CPI)')">Paket CPI</button>
                <button class="edu-btn bg-red" onclick="reqAction('COMBO_NEWS', 'Paket FOMC (Rate, Dot Plot, Press Con)')">Paket FOMC</button>
            </div>
        </div>
    </div>

    <script>
        // Inisialisasi Telegram WebApp dengan aman
        let isTelegramEnv = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData !== "");
        if (isTelegramEnv) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
        
        let ws; 
        let currentPrice = 0; 
        let currentPosition = ''; 
        let entryPrice = 0; 
        let activeLot = 0;

        const quizData = [
            { q: "Konsep 'Smart Money' sering menargetkan area apa untuk menjebak retail?", opts: ["Area Support & Resistance", "Area Liquidity", "Titik Fibonacci 0.5", "Garis Moving Average"], ans: 1 },
            { q: "Jika Data Inflasi (CPI) AS meroket tajam dari perkiraan, apa yang biasa The Fed lakukan?", opts: ["Menurunkan Suku Bunga", "Menaikkan Suku Bunga", "Membeli Obligasi", "Mencetak Uang"], ans: 1 }
        ];

        function initQuiz() {
            let overlay = document.getElementById("quiz-overlay");
            let qIndex = Math.floor(Math.random() * quizData.length);
            let currentQ = quizData[qIndex];
            
            document.getElementById("quiz-question").innerText = currentQ.q;
            let optionsDiv = document.getElementById("quiz-options");
            optionsDiv.innerHTML = "";
            
            currentQ.opts.forEach((opt, idx) => {
                let btn = document.createElement("button");
                btn.className = "quiz-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, currentQ.ans);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            document.getElementById("quiz-overlay").style.display = "none";
            if(selected === correct) {
                document.body.style.backgroundColor = "#0d47a1"; 
                if (isTelegramEnv && Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                createRain("+$", "#00e676", 40);
            } else {
                document.body.style.backgroundColor = "#8a0303"; 
                if (isTelegramEnv && Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                createRain("-$", "#ff1744", 40);
            }
            setTimeout(() => { document.body.style.backgroundColor = "#0b0e14"; }, 4000);
        }

        function createRain(text, color, count) {
            for(let i=0; i<count; i++) {
                let el = document.createElement("div");
                el.innerText = text;
                el.className = "rain-icon";
                el.style.color = color;
                el.style.left = (Math.random() * 95) + "vw";
                el.style.top = "-50px";
                el.style.animationDuration = (Math.random() * 1.5 + 2) + "s"; 
                document.body.appendChild(el);
                setTimeout(() => { el.remove(); }, 4000); 
            }
        }

        initQuiz();

        function showTab(t, elem) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            elem.classList.add('active');
        }

        function saveState() { 
            localStorage.setItem('tradeData', JSON.stringify({ pos: currentPosition, price: entryPrice, lot: activeLot, pair: document.getElementById("pair").value })); 
        }
        
        function loadState() {
            let data = localStorage.getItem('tradeData');
            if (data) {
                let state = JSON.parse(data);
                if (state.pos !== '') {
                    currentPosition = state.pos; entryPrice = state.price; activeLot = state.lot;
                    document.getElementById("pair").value = state.pair; 
                    document.getElementById('status-text').innerText = `POSISI AKTIF: ${currentPosition} @ ${entryPrice}`;
                    document.getElementById('status-text').style.color = '#089981';
                }
            }
        }

        function connectWS(symbol) {
            if(ws) ws.close();
            let priceDisplay = document.getElementById('live-price');
            priceDisplay.innerText = "Mengkoneksikan...";
            priceDisplay.style.color = "#e0e0e0";
            
            try {
                ws = new WebSocket(`wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@trade`);
                
                ws.onmessage = (event) => {
                    currentPrice = parseFloat(JSON.parse(event.data).p);
                    priceDisplay.innerText = currentPrice.toFixed(2); 
                    priceDisplay.style.color = "#e0e0e0";
                    calculatePnL();
                };

                ws.onerror = (error) => {
                    priceDisplay.innerText = "Koneksi ISP Terblokir (Gunakan VPN)";
                    priceDisplay.style.color = "#f23645";
                    priceDisplay.style.fontSize = "16px";
                };
            } catch (e) {
                priceDisplay.innerText = "Gagal Memuat Harga";
            }
        }

        function calculatePnL() {
            let pnlDisplay = document.getElementById('pnl-display');
            if(currentPosition === '') { 
                pnlDisplay.innerText = `Floating: $0.00`; pnlDisplay.className = 'pnl-box'; return; 
            }
            let diff = (currentPosition === 'BUY') ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
            let pnl = diff * activeLot * (document.getElementById("pair").value === 'BTCUSDT' ? 1 : 100);
            pnlDisplay.innerText = `Floating: $${pnl.toFixed(2)}`;
            pnlDisplay.className = pnl >= 0 ? 'pnl-box pnl-green' : 'pnl-box pnl-red';
        }

        function changePair() {
            let pair = document.getElementById("pair").value; 
            connectWS(pair);
            document.getElementById("tv-chart").innerHTML = "";
            new TradingView.widget({ 
                "container_id": "tv-chart", "symbol": "BINANCE:" + pair, 
                "theme": "dark", "autosize": true, "interval": "15" 
            });
        }

        function execTrade(type) {
            if(currentPosition !== '') { alert("Tutup posisi aktif dulu."); return; }
            if(currentPrice === 0) { alert("Menunggu harga aktual... Pastikan VPN menyala jika harga terblokir."); return; }
            
            currentPosition = type; entryPrice = currentPrice; 
            activeLot = parseFloat(document.getElementById("lot").value) || 0.01;
            
            document.getElementById('status-text').innerText = `POSISI AKTIF: ${type} @ ${entryPrice}`;
            document.getElementById('status-text').style.color = '#089981'; 
            saveState(); 
            if (isTelegramEnv && Telegram.WebApp.HapticFeedback) Telegram.WebApp.HapticFeedback.impactOccurred('heavy');
        }

        function execClose() {
            if(currentPosition === '') return;
            let diff = (currentPosition === 'BUY') ? (currentPrice - entryPrice) : (entryPrice - currentPrice);
            let finalPnL = diff * activeLot * (document.getElementById("pair").value === 'BTCUSDT' ? 1 : 100);
            
            let payload = JSON.stringify({ action: 'CLOSE_TRADE', pair: document.getElementById("pair").value, type: currentPosition, pnl: finalPnL.toFixed(2) });
            
            if (isTelegramEnv) {
                Telegram.WebApp.sendData(payload);
            } else {
                alert(`[Mode Browser] Simulasi Kirim Data ke Bot:\n${payload}`);
            }
            
            currentPosition = ''; localStorage.removeItem('tradeData');
            document.getElementById('status-text').innerText = `Menunggu Market...`; 
            document.getElementById('status-text').style.color = '#aaa';
            calculatePnL();
        }

        function processNews(tipe) {
            let n = document.getElementById("newsName").value;
            if(!n) { alert("Kopas dulu beritanya!"); return; }
            
            let payload = JSON.stringify({ 
                action: tipe === 'TRANSLATE' ? 'TRANSLATE_NEWS' : 'CALENDAR_ANALYSIS', 
                nama: n, aktual: document.getElementById("newsAct").value || "-", 
                previous: document.getElementById("newsPrev").value || "-", 
                forecast: document.getElementById("newsFore").value || "-" 
            });

            if (isTelegramEnv) {
                Telegram.WebApp.sendData(payload);
                Telegram.WebApp.close();
            } else {
                alert(`[Mode Browser] Data Berita:\n${payload}`);
            }
        }

        function reqAction(act, val) {
            if(!val) { alert("Kolom tidak boleh kosong!"); return; }
            let payload = JSON.stringify({ action: act, data: val });
            
            if (isTelegramEnv) {
                Telegram.WebApp.sendData(payload);
                Telegram.WebApp.close();
            } else {
                alert(`[Mode Browser] Meminta Tindakan:\n${payload}`);
            }
        }

        loadState(); 
        changePair();
    </script>
</body>
</html>
